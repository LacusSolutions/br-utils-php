name: Sync Packages to Individual Repositories

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: read

jobs:
  detect-packages:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list-packages.outputs.matrix }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: list-packages
        run: |
          PACKAGES_DIR="packages"
          echo "🔍 Discovering packages in $PACKAGES_DIR directory..."
          PACKAGES_NAMES=$(find "$PACKAGES_DIR" -mindepth 1 -maxdepth 1 -type d -not -empty | sed 's|^.*/||' | sort)

          PACKAGES=()
          for package_name in $PACKAGES_NAMES; do
            # Skip if package_name is empty or contains invalid characters
            if [[ -z "$package_name" || "$package_name" =~ [^a-zA-Z0-9_-] ]]; then
              echo "⚠️  Skipping invalid package name: '$package_name'"
              continue
            fi

            # Subtree on another branch
            package_prefix="$PACKAGES_DIR/$package_name"
            target_type="branch"
            repo_url="git@github.com:${GITHUB_REPOSITORY}.git"
            branch="$package_name/main"
            PACKAGES+=("{\"name\":\"$package_name\",\"prefix\":\"$package_prefix\",\"repo\":\"$repo_url\",\"branch\":\"$branch\",\"type\":\"$target_type\"}")

            # Subtree on another repository
            package_prefix="$PACKAGES_DIR/$package_name"
            target_type="repository"
            repo_url="git@github.com:${GITHUB_REPOSITORY}_$package_name.git"
            branch="main"
            PACKAGES+=("{\"name\":\"$package_name\",\"prefix\":\"$package_prefix\",\"repo\":\"$repo_url\",\"branch\":\"$branch\",\"type\":\"$target_type\"}")
          done

          # Convert array to JSON and save metadata to matrix output
          if [ ${#PACKAGES[@]} -eq 0 ]; then
            echo "❌ No valid packages found"
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
            exit 1
          fi

          printf -v packages_json '%s,' "${PACKAGES[@]}"
          packages_json="[${packages_json%,}]"
          echo "matrix={\"include\":$packages_json}" >> $GITHUB_OUTPUT
          echo "📦 ${#PACKAGES[@]} packages found"

  sync-package:
    needs: detect-packages
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect-packages.outputs.matrix) }}
      fail-fast: false # Continue syncing other packages even if one fails
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - id: push-subtree
        env:
          PACKAGE_NAME: ${{ matrix.name }}
          PACKAGE_PREFIX: ${{ matrix.prefix }}
          PACKAGE_REPO: ${{ matrix.repo }}
          PACKAGE_BRANCH: ${{ matrix.branch }}
          PACKAGE_TYPE: ${{ matrix.type }}
        run: |
          echo "🔄 Syncing '$PACKAGE_NAME'..."
          echo "📦 Package:    $PACKAGE_NAME"
          echo "📁 Path:       $PACKAGE_PREFIX"
          echo "🔗 Repository: $PACKAGE_REPO"
          echo "🌿 Branch:     $PACKAGE_BRANCH"

          push_output=$(git subtree push --prefix="$PACKAGE_PREFIX" "$PACKAGE_REPO" "$PACKAGE_BRANCH" 2>&1)
          push_exit_code=$?

          if [ $push_exit_code -eq 0 ]; then
            if echo "$push_output" | grep -q "Everything up-to-date"; then
              echo "ℹ️ '$PACKAGE_NAME' already up-to-date with $PACKAGE_TYPE"
              status="ℹ️ up-to-date"
            else
              echo "✅ '$PACKAGE_NAME' successfully synced with $PACKAGE_TYPE"
              status="✅ synced"
            fi
          else
            echo "❌ '$PACKAGE_NAME' failed to sync with $PACKAGE_TYPE"
            status="❌ failed"
            exit 1
          fi
